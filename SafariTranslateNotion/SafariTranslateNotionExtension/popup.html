<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translate & Save</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-root">
      <h1 class="popup-title">Translate & Save</h1>
      <textarea id="inputText" class="popup-input" rows="4" maxlength="500" placeholder="Type a word or phrase..."></textarea>
      <div class="popup-actions">
        <button id="translateBtn" class="btn btn-primary" type="button">Translate</button>
        <button id="saveBtn" class="btn btn-secondary" type="button" disabled>Save</button>
      </div>
      <p id="translationText" class="popup-translation"></p>
      <p id="statusText" class="popup-status"></p>
      <button id="settingsBtn" class="btn btn-primary btn-settings" type="button">Open Settings</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
